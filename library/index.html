<script>

/* ───────────────────────────────────────────────────────────────
   THE LIBRARY — everything on this page is built from the list below.

   To add a lesson: add one line to a module's "lessons" array.
   To add a whole chapter: copy a { num, title, sub, lessons:[...] } block.
   Order top-to-bottom is the order shown. The "Jump to a chapter"
   pills are generated automatically from this same list.

   num   : chapter number shown in the marker, e.g. "05"
   title : chapter name
   sub   : one-line description under the chapter name
   lesson: { href, title, summary, meta }  (meta = read time, e.g. "4 min")
─────────────────────────────────────────────────────────────── */
var LIBRARY = [
  {
    num: "01", title: "Foundations", sub: "Start from zero. What this is, and why it exists.",
    lessons: [
      { href: "/library/what-is-cryptocurrency", title: "What Is Cryptocurrency? Start Here.", summary: "Cryptocurrency is money that lives on the internet and isn't controlled by any single bank, company, or government.", meta: "4 min" },
      { href: "/library/what-is-blockchain", title: "What Is Blockchain? The Shared Record Behind It All", summary: "A blockchain is a record book that thousands of computers keep at the same time, so no single one can secretly change it.", meta: "4 min" },
      { href: "/library/coins-tokens-bitcoin", title: "Coins, Tokens, and Bitcoin: What's the Difference?", summary: "A coin has its own blockchain, a token is built on top of someone else's, and Bitcoin is just the first and biggest coin.", meta: "4 min" },
      { href: "/library/why-crypto-has-value", title: "Why Does Crypto Have Value?", summary: "Crypto has value for the same reason most things do, people want it and there's a limited amount, but it's worth being honest that this is also the most debated question in crypto.", meta: "5 min" }
    ]
  },
  {
    num: "02", title: "Before You Touch It", sub: "Exchanges, wallets, and keeping yourself safe.",
    lessons: [
      { href: "/library/what-is-an-exchange", title: "What Is a Crypto Exchange?", summary: "An exchange is where you swap regular money for crypto (and back), and there are two kinds, one run by a company and one run by code.", meta: "4 min" },
      { href: "/library/what-is-a-wallet", title: "What Is a Crypto Wallet?", summary: "A crypto wallet doesn't actually hold your coins, it holds the keys that prove the coins are yours.", meta: "4 min" },
      { href: "/library/seed-phrase", title: "Your Seed Phrase: The One Rule That Matters Most", summary: "Your seed phrase is the master key to everything you own in crypto. Write it down, keep it offline, and never share it with anyone.", meta: "4 min" },
      { href: "/library/common-crypto-scams", title: "Common Crypto Scams, and How to Spot Them", summary: "Almost every crypto scam works by creating urgency, faking authority, or promising free money. Learn the patterns once, and you'll see them coming.", meta: "5 min" },
      { href: "/library/staying-safe-checklist", title: "Staying Safe: A Crypto Security Checklist", summary: "Good crypto security isn't about being paranoid, it's about a few simple habits that, done consistently, stop almost every common attack.", meta: "4 min" }
    ]
  },
  {
    num: "03", title: "How It Works", sub: "Fees, networks, and stablecoins.",
    lessons: [
      { href: "/library/transactions-fees-gas", title: 'Transactions, Fees, and "Gas"', summary: 'Every time you move crypto on a blockchain, you pay a small fee called "gas," and it exists to pay the network and stop people from spamming it.', meta: "4 min" },
      { href: "/library/networks-and-layers", title: 'Networks and "Layers": Why So Many Chains?', summary: 'There isn\'t one blockchain, there are many, and "Layer 2" just means a faster, cheaper network built on top of a slower, more secure one.', meta: "4 min" },
      { href: "/library/stablecoins-explained", title: 'Stablecoins: The "Digital Dollar," and Why It\'s Not Risk-Free', summary: "A stablecoin is crypto designed to hold a steady value, usually one US dollar, but the calm name hides some real risks worth knowing.", meta: "5 min" }
    ]
  },
  {
    num: "04", title: "Reading the Market", sub: "Data and indicators, explained as education.",
    lessons: [
      { href: "/library/how-to-read-market-data", title: "How to Read Crypto Market Data", summary: "Price, market cap, and volume each tell you something useful, but only when you read them together, and knowing what they don't say is just as important.", meta: "4 min" },
      { href: "/library/what-are-indicators", title: "What Are Indicators? Reading the Ozgnos Dashboard", summary: "Indicators are math applied to past price data to describe what's happening, like a weather forecast for the market, useful for context, never a command to act.", meta: "5 min" },
      { href: "/library/fear-and-greed-index", title: "The Fear & Greed Index: Reading the Market's Mood", summary: "The Fear & Greed Index boils the market's overall emotion down to a single number from 0 to 100, a snapshot of mood, not a prediction of what comes next.", meta: "5 min" },
      { href: "/library/why-dyor-matters", title: 'Why "DYOR" Matters (and How to Actually Do It)', summary: 'DYOR means "Do Your Own Research," and it\'s the habit of verifying things yourself instead of trusting anyone\'s word, including ours.', meta: "5 min" }
    ]
  }
];

(function renderLibrary(){
  var esc = function(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); };
  var jump = document.getElementById('chapterJump');
  var mods = document.getElementById('modules');
  if(!mods) return;

  if(jump){
    jump.innerHTML = LIBRARY.map(function(m){
      return '<a class="chapter-pill" href="#mod-' + esc(m.num) + '"><span class="n">' + esc(m.num) + '</span>' + esc(m.title) + '</a>';
    }).join('');
  }

  mods.innerHTML = LIBRARY.map(function(m){
    var lessons = m.lessons.map(function(l){
      return '<a class="lesson-card" href="' + esc(l.href || '#') + '">' +
        '<div><div class="lesson-title">' + esc(l.title) + '</div>' +
        '<div class="lesson-summary">' + esc(l.summary) + '</div></div>' +
        (l.meta ? '<div class="lesson-meta">' + esc(l.meta) + '</div>' : '') +
      '</a>';
    }).join('');
    return '<section class="module" id="mod-' + esc(m.num) + '">' +
      '<div class="module-head"><span class="module-num">' + esc(m.num) + '</span>' +
      '<div><h2>' + esc(m.title) + '</h2>' + (m.sub ? '<p>' + esc(m.sub) + '</p>' : '') + '</div></div>' +
      '<div class="lessons">' + lessons + '</div></section>';
  }).join('');
})();
</script>
